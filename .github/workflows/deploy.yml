name: Deploy to Hostpoint

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: site

      - name: Build site
        working-directory: site
        run: |
          npx gulp setup
          npx sass \
            src/scss/theme/theme-three.scss:dist/assets/css/theme-three.css \
            src/scss/theme/main.scss:dist/assets/css/main.css \
            --style=compressed --quiet-deps
          npx gulp assemble
          cp src/*.php dist/

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTPOINT_SSH_KEY }}

      - name: Pin Hostpoint host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.HOSTPOINT_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        run: rsync -rtv --delete site/dist/ aliwunuz@sl82.web.hostpoint.ch:/home/aliwunuz/www/codecore.ch
